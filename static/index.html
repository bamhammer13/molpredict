<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>MolPredict - My Water Solubility Predictor</title>
</head>
<body>
    <h1>MolPredict</h1>
    <p>Enter a molecule in Simplified Molecular Input Line Entry System(SMILES) Format</p>
    <form id="predict-form">
        <input id="smiles-input" type="text" placeholder="e.g. CCO"/>
        <button type=:"submit">Predict</button>
    </form>
    <p id="result"></p>
    <img id="mol-img" alt="molecule structure" />
    <script src="/static/app.js"></script>
</body>
</html>
