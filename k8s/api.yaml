# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: molpredict-api
spec:
  replicas: 1 # One pod for now
  selector:
    matchLabels:
      app: molpredict-api
  template:
    metadata:
      labels:
        app: molpredict-api
    spec:
      containers:
        - name: api
          image: molpredict:v7
          imagePullPolicy: IfNotPresent # Use loaded image
          env:
            - name: REDIS_HOST
              value: redis
          ports:
            - containerPort: 8000

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: molpredict-api
  labels:
    app: molpredict-api
spec:
  selector:
    app: molpredict-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: NodePort
