apiVersion: v1
kind: Service
metadata:
  name: molpredict-api
  labels:
    app: molpredict-api
spec:
  type: {{ .Values.api.service.type }}          # ← was NodePort (now swappable to LoadBalancer!)
  selector:
    app: molpredict-api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: 8000
